name: CI

on:
  pull_request:
  push:
    branches: [main, migration/vercel]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Audit HARD-01 (no supabase.from(onboarding_*) in src/)
        # Plan 01-03 fechou o gate (exit 0); Plan 01-04 trava como bloqueante de PR.
        run: npm run audit:no-supabase-from

      - name: Run Vitest
        run: npm test -- --run
