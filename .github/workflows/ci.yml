name: CI

on:
  pull_request:
  push:
    branches: [main, migration/vercel]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Audit HARD-01 (no supabase.from(onboarding_*) in src/)
        # Esperado falhar até Wave 2 (Plan 03) completar a migração leitura/escrita.
        # Remover continue-on-error quando o audit ficar green.
        continue-on-error: true
        run: npm run audit:no-supabase-from

      - name: Run Vitest
        run: npm test -- --run
